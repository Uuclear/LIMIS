version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-limis}
      POSTGRES_USER: ${DB_USER:-limis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-limis123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 避免与宿主机已占用 5432 的 PostgreSQL 冲突，映射到宿主机 5434
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-limis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=limis.settings.dev
      - DB_NAME=${DB_NAME:-limis}
      - DB_USER=${DB_USER:-limis}
      - DB_PASSWORD=${DB_PASSWORD:-limis123}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - USE_HTTPS=${USE_HTTPS:-false}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-limis}
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn limis.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  celery:
    build: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=limis.settings.dev
      - DB_NAME=${DB_NAME:-limis}
      - DB_USER=${DB_USER:-limis}
      - DB_PASSWORD=${DB_PASSWORD:-limis123}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - USE_HTTPS=${USE_HTTPS:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A limis worker -l info

  celery-beat:
    build: ./backend
    environment:
      - DJANGO_SETTINGS_MODULE=limis.settings.dev
      - DB_NAME=${DB_NAME:-limis}
      - DB_USER=${DB_USER:-limis}
      - DB_PASSWORD=${DB_PASSWORD:-limis123}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - USE_HTTPS=${USE_HTTPS:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A limis beat -l info

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_data:
  media_data:
