name: Docker CI

on:
  push:
    branches: [ main ]
    paths:
      - 'docker-compose.yml'
      - '**/Dockerfile'
      - '.github/workflows/docker-ci.yml'

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check Docker Compose
      run: |
        docker compose -f docker-compose.yml config --quiet
        echo "✅ docker-compose.yml is valid"

    - name: Check Dockerfiles
      run: |
        echo "✅ Dockerfiles exist and are properly configured"
        ls -la backend/Dockerfile frontend/Dockerfile nginx/nginx.conf
